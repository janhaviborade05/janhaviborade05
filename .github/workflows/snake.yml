name: generate snake

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: janhaviborade05
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%239B7A93&color_dots=%23F0E0E0,%23F5C6D0,%23D4A5A5,%239B7A93,%235A4352

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
